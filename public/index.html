<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme color (navy) so the browser chrome / no-JS flash matches the app -->
    <meta name="theme-color" content="#0F1C2E" />
    <meta
      name="description"
      content="GGO Time Management — scheduling, time clock, announcements and team directory."
    />

    <!-- Inter font from Google Fonts (preconnect first for faster loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>GGO Time Management</title>

    <!-- Set the base background early so there is no white flash before React mounts -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #0f1c2e;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React mounts the entire application into this element (see src/index.js) -->
    <div id="root"></div>
  </body>
</html>
