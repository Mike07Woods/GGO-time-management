<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Theme color so the browser chrome / no-JS flash matches the app -->
    <meta name="theme-color" content="#0A0F1E" />

    <!-- PWA: installable web app -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GGO" />
    <meta
      name="description"
      content="GGO Time Management — scheduling, time clock, announcements and team directory."
    />

    <!-- Plus Jakarta Sans (modern, rounded — closest Google Fonts match to TT Firs Neue) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>GGO Time Management</title>

    <!-- Set the base background early so there is no white flash before React mounts -->
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #0a0f1e;
      }
    </style>

    <!-- Apply the saved light/dark theme BEFORE React mounts to avoid a flash.
         Defaults to dark mode. The Navbar toggle updates this + localStorage. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ggo-theme');
          var mode = saved === 'light' ? 'light-mode' : 'dark-mode';
          document.addEventListener('DOMContentLoaded', function () {
            document.body.className = mode;
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="dark-mode">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React mounts the entire application into this element (see src/index.js) -->
    <div id="root"></div>
  </body>
</html>
